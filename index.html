<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatAPI — Windows API Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --c-bg:        #0a0c0f;
  --c-surface:   #111418;
  --c-raised:    #181c22;
  --c-border:    #1f2630;
  --c-border-2:  #2a3340;
  --c-text:      #d4dae3;
  --c-muted:     #6b7785;
  --c-faint:     #2e3845;

  --c-blue:      #3b8de0;
  --c-blue-dim:  rgba(59,141,224,.12);
  --c-red:       #e05050;
  --c-red-dim:   rgba(224,80,80,.12);
  --c-amber:     #e09030;
  --c-amber-dim: rgba(224,144,48,.12);
  --c-green:     #38b27a;
  --c-green-dim: rgba(56,178,122,.12);
  --c-purple:    #9b72e8;
  --c-purple-dim:rgba(155,114,232,.12);
  --c-teal:      #2fbfb0;
  --c-teal-dim:  rgba(47,191,176,.12);
  --c-pink:      #e06098;
  --c-slate:     #5a7080;

  --radius-sm: 4px;
  --radius-md: 7px;
  --radius-lg: 10px;

  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}

/* ─── RESET ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* subtle grid bg */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ─── LAYOUT ─────────────────────────────────────────────── */
#app { position: relative; z-index: 1; }

/* ─── TOPBAR ─────────────────────────────────────────────── */
#topbar {
  height: 52px;
  border-bottom: 1px solid var(--c-border);
  background: rgba(10,12,15,.92);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 32px;
  position: sticky; top: 0; z-index: 100;
}

.brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.brand-mark {
  width: 26px; height: 26px;
  border: 1.5px solid var(--c-blue);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.brand-mark::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--c-blue);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--c-blue);
}
.brand-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--c-text);
}
.brand-name span { color: var(--c-blue); }

.nav {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.nav-item {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--c-muted);
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: .05em;
  transition: color .15s, background .15s;
}
.nav-item:hover { color: var(--c-text); background: var(--c-raised); }
.nav-item.active {
  color: var(--c-blue);
  background: var(--c-blue-dim);
  border: 1px solid rgba(59,141,224,.25);
}

.topbar-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-muted);
  flex-shrink: 0;
  display: flex; gap: 16px; align-items: center;
}
.topbar-meta span { display: flex; align-items: center; gap: 5px; }
.topbar-meta i {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-green);
  box-shadow: 0 0 6px var(--c-green);
  display: inline-block;
}

/* ─── MAIN CONTENT ───────────────────────────────────────── */
.page { display: none; padding: 24px; max-width: 1600px; margin: 0 auto; }
.page.active { display: block; }

/* ─── STAT STRIP ─────────────────────────────────────────── */
.stat-strip {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.stat-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  flex: 1; min-width: 140px;
}
.stat-card-bar {
  width: 2px; border-radius: 2px;
  height: 28px; flex-shrink: 0;
}
.stat-card-label {
  font-size: 10.5px;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  font-family: var(--font-mono);
}
.stat-card-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--c-text);
  line-height: 1.1;
}

/* ─── TOOLBAR ─────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 8px; margin-bottom: 12px;
  align-items: center; flex-wrap: wrap;
}
.search-wrap {
  flex: 1; min-width: 200px;
  display: flex; align-items: center;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 0 12px;
  gap: 8px;
  transition: border-color .15s;
}
.search-wrap:focus-within { border-color: var(--c-blue); }
.search-icon {
  width: 14px; height: 14px; flex-shrink: 0;
  color: var(--c-muted);
}
.search-wrap input {
  background: none; border: none; outline: none;
  color: var(--c-text);
  font-family: var(--font-mono);
  font-size: 12px;
  width: 100%;
  padding: 8px 0;
}
.search-wrap input::placeholder { color: var(--c-faint); }

.select-field {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 7px 10px;
  color: var(--c-muted);
  font-family: var(--font-mono);
  font-size: 11.5px;
  outline: none;
  transition: border-color .15s;
  cursor: pointer;
}
.select-field:focus { border-color: var(--c-blue); color: var(--c-text); }

.btn {
  padding: 7px 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-muted);
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: .03em;
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--c-border-2); color: var(--c-text); }
.btn-primary {
  border-color: rgba(59,141,224,.4);
  color: var(--c-blue);
  background: var(--c-blue-dim);
}
.btn-primary:hover { border-color: var(--c-blue); background: rgba(59,141,224,.18); }
.btn-sm { padding: 4px 10px; font-size: 11px; }

.result-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-muted);
  white-space: nowrap;
  padding: 7px 12px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
}

/* ─── CATEGORY PILLS ─────────────────────────────────────── */
.cat-bar {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.cat-pill {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid;
  background: none;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
}

/* ─── TABLE ─────────────────────────────────────────────── */
.table-wrap {
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 860px; }
thead { background: var(--c-raised); border-bottom: 1px solid var(--c-border); }
th {
  padding: 10px 14px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  color: var(--c-muted);
  letter-spacing: .09em;
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
}
th.sortable { cursor: pointer; transition: color .15s; }
th.sortable:hover { color: var(--c-text); }
th.sort-asc::after  { content: ' ↑'; opacity: .6; }
th.sort-desc::after { content: ' ↓'; opacity: .6; }

tbody tr {
  border-bottom: 1px solid rgba(31,38,48,.7);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.018); }

td {
  padding: 9px 14px;
  font-size: 12.5px;
  vertical-align: top;
}

.api-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-blue);
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .1s;
}
.api-name:hover { opacity: .75; text-decoration: underline; }

.dll-tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 2px 7px;
  background: var(--c-purple-dim);
  border: 1px solid rgba(155,114,232,.22);
  border-radius: var(--radius-sm);
  color: var(--c-purple);
  white-space: nowrap;
}

.tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  border: 1px solid;
  margin: 1px;
  letter-spacing: .03em;
}

.mitre-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  background: var(--c-amber-dim);
  border: 1px solid rgba(224,144,48,.22);
  color: var(--c-amber);
  white-space: nowrap;
  margin: 1px;
  display: inline-block;
  cursor: pointer;
  transition: background .1s;
}
.mitre-tag:hover { background: rgba(224,144,48,.22); }

.risk-wrap { display: flex; align-items: center; gap: 7px; }
.risk-bar-track {
  width: 40px; height: 3px;
  background: var(--c-faint);
  border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.risk-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.risk-text { font-family: var(--font-mono); font-size: 10.5px; }

.desc-cell {
  color: var(--c-muted);
  font-size: 12px;
  line-height: 1.55;
  max-width: 300px;
}

.row-cb { accent-color: var(--c-blue); cursor: pointer; }

.no-data {
  text-align: center;
  padding: 40px;
  color: var(--c-muted);
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ─── MODAL ─────────────────────────────────────────────── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index: 900;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--c-surface);
  border: 1px solid var(--c-border-2);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 680px;
  max-height: 88vh; overflow-y: auto;
  padding: 28px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(59,141,224,.08);
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none;
  border: 1px solid var(--c-border);
  color: var(--c-muted);
  border-radius: var(--radius-sm);
  padding: 3px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  transition: all .15s;
}
.modal-close:hover { border-color: var(--c-red); color: var(--c-red); }
.modal-title {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--c-blue);
  margin-bottom: 4px;
}
.modal-sub {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--c-muted);
  margin-bottom: 20px;
}
.modal-section { margin-top: 18px; }
.modal-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c-muted);
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--c-border);
}
.chain-row {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-top: 6px;
}
.chain-node {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border);
  background: var(--c-raised);
  color: var(--c-text);
  white-space: nowrap;
}
.chain-node.hl {
  border-color: rgba(59,141,224,.5);
  color: var(--c-blue);
  background: var(--c-blue-dim);
}
.chain-arrow { color: var(--c-muted); font-size: 11px; }
.chain-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--c-muted);
  margin-bottom: 4px;
  margin-top: 10px;
}

/* ─── EXPORT MODAL ───────────────────────────────────────── */
.export-tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
.export-tab {
  padding: 5px 12px;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  background: none;
  color: var(--c-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.export-tab.active { border-color: rgba(59,141,224,.4); color: var(--c-blue); background: var(--c-blue-dim); }
.code-out {
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 14px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.7;
  color: var(--c-green);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 380px;
  overflow-y: auto;
}

/* ─── CHAINS PAGE ────────────────────────────────────────── */
.chains-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 12px; }
.chain-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.chain-card:hover { border-color: var(--c-border-2); box-shadow: 0 4px 24px rgba(0,0,0,.3); }
.chain-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.chain-cat-badge {
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.chain-card-name {
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--c-text);
}
.chain-card-desc {
  font-size: 12px;
  color: var(--c-muted);
  margin-bottom: 12px;
  line-height: 1.5;
}
.chain-flow-row {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.chain-flow-node {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid;
  white-space: nowrap;
}
.chain-flow-sep { font-size: 10px; color: var(--c-muted); }

/* ─── HEATMAP PAGE ───────────────────────────────────────── */
.heatmap-controls { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
.heatmap-section { margin-bottom: 24px; }
.heatmap-section-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; gap: 8px;
}
.heatmap-section-label span { color: var(--c-muted); font-weight: 400; }
.hm-cells { display: flex; flex-wrap: wrap; gap: 3px; }
.hm-cell {
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  cursor: pointer;
  transition: transform .1s, opacity .1s;
  white-space: nowrap;
  border: 1px solid transparent;
}
.hm-cell:hover { transform: translateY(-1px); opacity: .85; border-color: rgba(255,255,255,.15); }
.hm-legend { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
.hm-legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--c-muted); }
.hm-swatch { width: 10px; height: 10px; border-radius: 2px; }

/* ─── PE PAGE ────────────────────────────────────────────── */
.pe-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 800px) { .pe-layout { grid-template-columns: 1fr; } }
.pe-panel {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.pe-panel h3 {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--c-text);
  margin-bottom: 4px;
}
.pe-panel p { font-size: 12px; color: var(--c-muted); margin-bottom: 14px; line-height: 1.55; }
textarea.field {
  width: 100%;
  height: 220px;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  color: var(--c-text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 12px;
  resize: vertical;
  outline: none;
  line-height: 1.65;
  transition: border-color .15s;
}
textarea.field:focus { border-color: var(--c-blue); }
.pe-btn {
  margin-top: 10px;
  width: 100%;
  padding: 9px;
  background: none;
  border: 1px solid var(--c-border-2);
  border-radius: var(--radius-md);
  color: var(--c-text);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
}
.pe-btn:hover { border-color: var(--c-blue); color: var(--c-blue); background: var(--c-blue-dim); }
.pe-btn:disabled { opacity: .4; cursor: not-allowed; }

.finding {
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.finding-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.finding-title {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--c-text);
}
.severity-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid;
  letter-spacing: .04em;
}
.api-finding-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--c-border);
  gap: 8px;
}
.api-finding-row:last-child { border-bottom: none; }
.api-finding-name {
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--c-blue);
}
.api-finding-desc { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-family: var(--font-mono); font-size: 11.5px; color: var(--c-muted); }
.grid-2 strong { color: var(--c-text); }

/* ─── PAGE HEADER ────────────────────────────────────────── */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 16px; font-weight: 600; color: var(--c-text); margin-bottom: 4px; }
.page-header p { font-size: 12px; color: var(--c-muted); line-height: 1.6; }

/* ─── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--c-surface); }
::-webkit-scrollbar-thumb { background: var(--c-faint); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--c-muted); }

/* ─── ANIMATIONS ─────────────────────────────────────────── */

/* ============================================================
   HELPERS
   ============================================================ */
const $ = id => document.getElementById(id);
const h = (tag, attrs = {}, ...children) => {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return el;
};
const html = str => { const d = document.createElement('div'); d.innerHTML = str; return d.firstChild; };

function riskColor(r) {
  return r === 'Critical' ? '#e05050' : r === 'High' ? '#e09030' : r === 'Medium' ? '#38b27a' : '#5a7080';
}

function catColor(cat) {
  return (DB.categories[cat] || { color: '#5a7080' }).color;
}

function uid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

const UI = {
  openModal(id) { $(id).classList.add('open'); },
  closeModal(id) { $(id).classList.remove('open'); },
  closeModalOnBack(e, id) { if (e.target === $(id)) this.closeModal(id); },
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    UI.closeModal('modal-detail');
    UI.closeModal('modal-export');

const Router = {

  go(page) {
    State.page = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    $(`page-${page}`).classList.add('active');
    document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
    Renderer[page]?.();
  },

  buildNav() {
    const nav = $('nav');
    this.pages.forEach(p => {
      const btn = h('button', { class: 'nav-item', 'data-page': p, onClick: () => this.go(p) }, this.labels[p]);
      nav.appendChild(btn);
    });
  }
};

      const mq = !q || a.name.toLowerCase().includes(q) || a.dll.toLowerCase().includes(q) ||
                  a.desc.toLowerCase().includes(q) || a.mitre.some(m => m.toLowerCase().includes(q));
      const md = !State.filterDll || a.dll === State.filterDll;
      const mr = !State.filterRisk || a.risk === State.filterRisk;
      return mc && mq && md && mr;
    }).sort((a, b) => {
      let va = a[State.sortCol], vb = b[State.sortCol];
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return State.sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  },

  _buildExportCode(apis, mode) {
    const names = apis.map(a => a.name);
    const mitres = [...new Set(apis.flatMap(a => a.mitre))];
    const sev = apis.some(a => a.risk === 'Critical') ? 'CRITICAL' : apis.some(a => a.risk === 'High') ? 'HIGH' : 'MEDIUM';
    const date = new Date().toISOString().split('T')[0];

    if (mode === 'yara') {
      return `rule ThreatAPI_Suspicious_Imports
{
    meta:
        description = "Detects suspicious Windows API imports"
        author      = "ThreatAPI"
        date        = "${date}"
        severity    = "${sev}"
        mitre       = "${mitres.join(', ')}"

    strings:
${names.map(n => `        $fn_${n.replace(/[^a-zA-Z0-9]/g,'_')} = "${n}" ascii wide`).join('\n')}

    condition:
        uint16(0) == 0x5A4D and (
${names.map(n => `            $fn_${n.replace(/[^a-zA-Z0-9]/g,'_')}`).join(' or\n')}
        )
}`;
    } else if (mode === 'sigma') {
      return `title: Suspicious Windows API Import Usage
id: ${uid()}
status: experimental
description: Detects Windows API function imports associated with malicious behavior
author: ThreatAPI
date: ${date}
tags:
${mitres.map(m => `  - attack.${m.toLowerCase()}`).join('\n')}
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
${names.map(n => `      - '${n}'`).join('\n')}
  condition: selection
level: ${sev.toLowerCase()}`;
    } else if (mode === 'json') {
      return JSON.stringify(apis.map(a => ({
        name: a.name, dll: a.dll, categories: a.cats,
        mitre: a.mitre, risk: a.risk, riskScore: a.rv, description: a.desc
      })), null, 2);
    } else if (mode === 'csv') {
      const rows = [['Name','DLL','Categories','MITRE','Risk','RiskScore','Description']];
      apis.forEach(a => rows.push([a.name, a.dll, a.cats.join('|'), a.mitre.join('|'), a.risk, a.rv, `"${a.desc.replace(/"/g,"'")}"`]));
      return rows.map(r => r.join(',')).join('\n');
    } else {
      return `# ThreatAPI IOC Export — ${date}
# ${apis.length} Windows API indicators | Severity: ${sev}
# MITRE: ${mitres.join(', ')}

[API Function Names]
${names.join('\n')}

[DLLs]
${[...new Set(apis.map(a => a.dll))].join('\n')}

[Risk Breakdown]
Critical : ${apis.filter(a => a.risk === 'Critical').length}
High     : ${apis.filter(a => a.risk === 'High').length}
Medium   : ${apis.filter(a => a.risk === 'Medium').length}
Low      : ${apis.filter(a => a.risk === 'Low').length}`;
    }
  },

  runPE() {
    const input = $('pe-input')?.value.trim();
    if (!input) return;
    const btn = $('pe-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Analyzing…'; }

    const all = input.split(/[\n,; \t]+/).map(s => s.trim()).filter(Boolean);
    const matched = all.map(n => DB.apis.find(a => a.name.toLowerCase() === n.toLowerCase())).filter(Boolean);
    const unmatched = all.filter(n => !DB.apis.find(a => a.name.toLowerCase() === n.toLowerCase()));

    setTimeout(() => {
      this.renderPEResults(matched, unmatched, all);
      if (btn) { btn.disabled = false; btn.textContent = 'Analyze Import Table'; }
    }, 300);
  },

  renderPEResults(matched, unmatched, all) {
    const res = $('pe-results');
    if (!res) return;
    res.innerHTML = '';

    if (!matched.length) {
      res.appendChild(h('div', { style: 'color:var(--c-muted);font-size:12px;padding:8px 0' },
        `No known suspicious APIs found among ${all.length} functions checked. This does not guarantee the sample is benign.`));
      return;
    }

    const criticals = matched.filter(a => a.risk === 'Critical');
    const highs = matched.filter(a => a.risk === 'High');
    const cats = [...new Set(matched.flatMap(a => a.cats))];
    const mitres = [...new Set(matched.flatMap(a => a.mitre))];
    const matchedChains = DB.chains.filter(ch =>
      ch.apis.filter(n => matched.find(a => a.name === n)).length >= Math.min(3, Math.floor(ch.apis.length * 0.6))
    );
    const overallRisk = criticals.length > 0 ? 'Critical' : highs.length > 0 ? 'High' : 'Medium';
    const rc = riskColor(overallRisk);

    // Summary
    const summary = h('div', { class: 'finding' });
    const sumHeader = h('div', { class: 'finding-header' });
    const sumTitle = h('div', { class: 'finding-title' }, 'Summary');
    const sumBadge = h('span', { class: 'severity-badge' }, overallRisk);
    sumBadge.style.color = rc; sumBadge.style.borderColor = rc + '44'; sumBadge.style.background = rc + '14';
    sumHeader.append(sumTitle, sumBadge);
    const grid = h('div', { class: 'grid-2' });
    [
      ['Submitted', all.length], ['Matched', matched.length],
      ['Critical', criticals.length], ['High', highs.length],
      ['Categories', cats.length], ['Unknown', unmatched.length]
    ].forEach(([k, v]) => {
      const cell = document.createElement('div');
      cell.innerHTML = `${k}: <strong>${v}</strong>`;
      grid.appendChild(cell);
    });
    summary.append(sumHeader, grid);
    res.appendChild(summary);

    // Attack patterns
    if (matchedChains.length) {
      const f = h('div', { class: 'finding' });
      f.appendChild(h('div', { class: 'finding-title', style: 'margin-bottom:8px' }, 'Detected Attack Patterns'));
      matchedChains.forEach(ch => {
        const c = catColor(ch.cat);
        const row = h('div', { style: 'margin:4px 0;font-size:12px' });
        const name = h('strong', { style: `color:${c}` }, ch.name);
        const desc = h('span', { style: 'color:var(--c-muted)' }, ` — ${ch.desc}`);
        row.append(name, desc);
        f.appendChild(row);
      });
      res.appendChild(f);
    }

    // MITRE
    if (mitres.length) {
      const f = h('div', { class: 'finding' });
      f.appendChild(h('div', { class: 'finding-title', style: 'margin-bottom:8px' }, 'MITRE ATT&CK Techniques'));
      const wrap = h('div', { style: 'display:flex;gap:6px;flex-wrap:wrap' });
      mitres.forEach(m => {
        wrap.appendChild(h('a', { class: 'mitre-tag', href: `https://attack.mitre.org/techniques/${m.replace('.','/')}/`, target: '_blank' }, `${m} ↗`));
      });
      f.appendChild(wrap);
      res.appendChild(f);
    }

    // Critical/High APIs
    if (criticals.length + highs.length > 0) {
      const f = h('div', { class: 'finding' });
      f.appendChild(h('div', { class: 'finding-title', style: 'margin-bottom:8px' }, 'Critical and High Severity APIs'));
      [...criticals, ...highs].forEach(api => {
        const rc2 = riskColor(api.risk);
        const row = h('div', { class: 'api-finding-row' });
        const left = h('div', {});
        left.appendChild(h('div', { class: 'api-finding-name' }, api.name));
        left.appendChild(h('div', { class: 'api-finding-desc' }, api.desc));
        const badge = h('span', { class: 'severity-badge' }, api.risk);
        badge.style.color = rc2; badge.style.borderColor = rc2 + '44'; badge.style.background = rc2 + '14';
        row.append(left, badge);
        f.appendChild(row);
      });
      res.appendChild(f);
    }

    // Categories
    if (cats.length) {
      const f = h('div', { class: 'finding' });
      f.appendChild(h('div', { class: 'finding-title', style: 'margin-bottom:8px' }, 'Attack Categories'));
      const wrap = h('div', { style: 'display:flex;gap:6px;flex-wrap:wrap' });
      cats.forEach(cat => {
        const c = catColor(cat);
        const tag = h('span', { class: 'tag' }, cat);
        tag.style.color = c; tag.style.borderColor = c + '55'; tag.style.background = c + '18';
        wrap.appendChild(tag);
      });
      f.appendChild(wrap);
      res.appendChild(f);
    }

    // Unknown
    if (unmatched.length) {
      const f = h('div', { class: 'finding' });
      f.appendChild(h('div', { class: 'finding-title', style: 'margin-bottom:6px' }, `Unknown APIs (${unmatched.length})`));
      f.appendChild(h('div', { style: 'font-size:11px;color:var(--c-muted);margin-bottom:4px' }, 'Not in the ThreatAPI database. May be obfuscated, custom, or benign.'));
      f.appendChild(h('div', { style: 'font-family:var(--font-mono);font-size:11px;color:var(--c-muted);line-height:1.85' }, unmatched.join('  ·  ')));
      res.appendChild(f);
    }
  },

  /* ── HEATMAP PAGE ───────────────────────────────────────── */
  heatmap() {
    const root = $('page-heatmap');
    root.innerHTML = '';
    root.appendChild(h('div', { class: 'page-header' }, (() => {
      const d = document.createElement('div');
      d.innerHTML = `<h1>Risk Heatmap</h1><p>Visual overview of all APIs grouped and color-coded by severity score. Click any cell to view full details.</p>`;
      return d;
    })()));

    const controls = h('div', { class: 'heatmap-controls' });
    const groupSel = h('select', { class: 'select-field', id: 'hm-group' });
    [['cat','Group by Category'],['dll','Group by DLL']].forEach(([v, l]) => {
      const opt = h('option', {}, l); opt.value = v; groupSel.appendChild(opt);
    });
    const sortSel = h('select', { class: 'select-field', id: 'hm-sort' });
    [['risk','Sort by Risk'],['name','Sort Alphabetically']].forEach(([v, l]) => {
      const opt = h('option', {}, l); opt.value = v; sortSel.appendChild(opt);
    });
    const applyBtn = h('button', { class: 'btn btn-primary', onClick: () => this.renderHeatmapGrid(root) }, 'Apply');
    controls.append(groupSel, sortSel, applyBtn);
    root.appendChild(controls);

    const grid = h('div', { id: 'hm-grid' });
    root.appendChild(grid);

    const legend = h('div', { class: 'hm-legend' });
    [['#e05050','Critical (80–100)'],['#e09030','High (60–79)'],['#38b27a','Medium (40–59)'],['#2a3340','Low (0–39)']].forEach(([c, l]) => {
      const item = h('div', { class: 'hm-legend-item' });
      const swatch = h('div', { class: 'hm-swatch' }); swatch.style.background = c;
      item.append(swatch, document.createTextNode(l));
      legend.appendChild(item);
    });
    root.appendChild(legend);

    this.renderHeatmapGrid(root);
  },

  renderHeatmapGrid(root) {
    const groupBy = $('hm-group')?.value || 'cat';
    const sortBy  = $('hm-sort')?.value  || 'risk';
    const grid = $('hm-grid');
    if (!grid) return;
    grid.innerHTML = '';

    const groups = {};
    DB.apis.forEach(api => {
      const keys = groupBy === 'cat' ? api.cats : [api.dll];
      keys.forEach(k => { if (!groups[k]) groups[k] = []; groups[k].push(api); });
    });

    const sortedKeys = Object.keys(groups).sort((a, b) =>
      sortBy === 'risk'
        ? Math.max(...groups[b].map(x => x.rv)) - Math.max(...groups[a].map(x => x.rv))
        : a.localeCompare(b)
    );

    sortedKeys.forEach(gk => {
      const apis = groups[gk].sort((a, b) => sortBy === 'risk' ? b.rv - a.rv : a.name.localeCompare(b.name));
      const color = catColor(gk);

      const section = h('div', { class: 'heatmap-section' });
      const labelEl = h('div', { class: 'heatmap-section-label' });
      labelEl.style.color = color;
      labelEl.innerHTML = `${gk} <span>(${apis.length})</span>`;
      const cells = h('div', { class: 'hm-cells' });

      apis.forEach(api => {
        const { bg, tc } = this._hmColor(api.rv);
        const cell = h('div', { class: 'hm-cell' });
        cell.style.background = bg;
        cell.style.color = tc;
        cell.style.minWidth = Math.max(72, api.name.length * 7) + 'px';
        cell.title = `${api.name} — ${api.risk} (${api.rv}/100)\n${api.desc}`;
        cell.textContent = api.name.length > 16 ? api.name.slice(0, 15) + '…' : api.name;
        cell.addEventListener('click', () => this.showDetail(api.name));
        cells.appendChild(cell);
      });

      section.append(labelEl, cells);
      grid.appendChild(section);
    });
  },

  _hmColor(score) {
    if (score >= 80) return { bg: 'rgba(224,80,80,.65)',   tc: '#fff' };
    if (score >= 60) return { bg: 'rgba(224,144,48,.6)',   tc: '#fff' };
    if (score >= 40) return { bg: 'rgba(56,178,122,.55)',  tc: '#fff' };
    return             { bg: 'rgba(42,51,64,.7)',          tc: '#5a7080' };
  }
};

/* ============================================================
   BOOT
   ============================================================ */
(function boot() {
  Router.buildNav();

  // topbar meta
  const meta = $('topbar-meta');
  meta.innerHTML = `
    <span><i></i> ${DB.apis.length} APIs</span>
    <span>${DB.chains.length} chains</span>
    <span>MITRE mapped</span>
  `;

  // init pages
  $('page-database').className = 'page';
  $('page-chains').className   = 'page';
  $('page-pe').className       = 'page';
  $('page-heatmap').className  = 'page';

  Router.go('database');
})();
</script>
</body>
</html>
